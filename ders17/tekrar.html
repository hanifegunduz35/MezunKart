<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 1500px;
        }

        section {
            height: 500px;
            border: 1px solid black;
        }

        div {
            width: 100px;
            height: 100px;
            border: 1px solid red;

        }

        .stick {
            border-color: blue;
            position: sticky;
            top: 100px;
            left: 10px;
            transition: all 3s linear 1s;
            background-color: red;
            /* 1. özellik property - hover - hangi özelliğin değişmesini istiyorsam o özelliği veririm ya da all vererek bütün hover özelliklerine uygularım */
            /* 2. özellik duration yani ne kadar zamanda tamamlanacağını belirtir. */
            /* 3. özellik timing function yani geçiş hızını belirtir. */
            /* 4. özellik delay kaç saniye gecikmeli başlayacağını belirler  */

        }

        .stick:hover {
            /* transform: scale(1.1); */
            transform: rotate(180deg);
            background-color: aqua;
            width: 500px;
        }
    </style>
</head>

<body>
    <!-- transform-hero-img-position
     sticky verdiğim değere gelene kadar kendi yerinde duruyor verdiğim değere geldiğinde sayfayı takip etmeye başlar kapsayıcısı bitene kadar 
     relative-kendi yerini korur- absolute- relativ ile birlikte kullanılır kendi yerini korumaz relativ dive göre pozisyonlanır. eğer relative iççinde değilse body referans alır
     transform- -->
    <section>
        <div></div>
        <div class="stick">deneme</div>
        <div></div>

    </section>
</body>

</html>
