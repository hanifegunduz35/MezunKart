
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 200px;
            border: 1px solid black;
            /* position: static;   default değerdir kullanmaya gerek yok */
            /* position: relative;  kendi yerini korur istediğimiz noktaya pozisyonlandırılabilir*/
            /* position: absolute; kendi yerini korumaz sayfada özgürce pozisyonlandırılabilir.*/
            /* position: fixed; verdiğim pozisyona göre sayfanın scrool olsa bile o noktasında fix kalır. */
            /* left: 100px; 
            top: 100px; */
        }
        .deneme{
            position: sticky; /*kendi yerini korur verilen değere geldiğinde sayfaya fixlenerek devam eder tekrar eski konumuna döndüğünde yerine yerleşir. */
            top: 0;
            border-color: red;
        }
    </style>
</head>
<body>
    <div>
        <!-- kural 1 position absolute relative ile birlikte kullanılır -->

    <div class="deneme"></div>
