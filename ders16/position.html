<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 500px;
            height: 300px;
            border: 1px solid black;
            position: relative;
        }
        section{
            width: 100px;
            height: 100px;
            border: 1px solid red;
            position: absolute;
            /* kapsayıcısının relative olması lazım aksi takdirde direk body i referans alır . */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            /* x ekseninde - yönde % 50 si kadarını kaydır. y ekseninde - yönde %50 si kadarını kaydır */
            
        }
    </style>
</head>
<body>
    <div>
        <section></section>
    </div>
</body>
</html>
