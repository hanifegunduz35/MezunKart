<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            position: relative;
            left: 50%;
            top: 100px;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            transform: rotate(45deg);

        }
        div:hover{
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div>Lorem ipsum</div>
</body>
</html>
