<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        img {
            width: 100%;
            height: 100%;
        }

        .fotograf {
            width: 100%;
            height: 800px;
            position: relative;
        }

        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;

        }

        button {
           padding: 10px;
           border-radius: 5px;
        }
        button:hover{
            background-color: gray;
            color: white;
        }

        .yeni{
            margin: 20px 0;
        }
        h2{
            font-weight: bold; 
        }

    </style>

</head>

<body>
    <div class="fotograf">
        <img src="./fotograf1.jpg" alt="">
        <div class="text">
            <h2 class="yeni">I am John Doe</h2>
            <p class="yeni">I am a photographer</p>
            <button class="yeni">Hire me</button>

        </div>
    </div>
</body>

</html>
