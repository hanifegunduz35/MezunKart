<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            
            box-sizing: border-box;
        }
        html{
            font-size: 20px;
        }
        div{
            border: 1px solid black;
            width: 200px;
            height: 200px;
            font-size: 10px;
            padding: 10px;
            box-sizing: border-box;
        }
        section{
            width: 200px;
            height: 200px;
            border: 1px solid red;
        }
        p{
            /* font-size: 2em; */
            font-size: 2rem;
            /* text-transform: capitalize; ilk harfleri büyük yapar*/
            /* text-transform: uppercase; bütün harfleri büyük yapar*/
            text-transform: lowercase;  /* bütün harfleri küçük yapar*/
        }
        li{
            list-style-type: circle;        
        }
        div,p,h2,li{
            color: red;
        }
    </style>
</head>
<body>
    <!-- ölçüler -->
    <!-- px em rem % -->
    <!-- rem html referans alır  -->
     <ul>
        <li>Lorem</li>
         <li>Deneme</li>
    </ul>
     <div>
        <p>Lorem, ipsum dolor.</p>
     </div>
     <section>


     </section>
     
</body>
</html>
