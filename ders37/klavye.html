<!DOCTYPE html>
<html lang="en">
<head>

<body>

        let parag=document.querySelector("p")
        window.addEventListener("keydown",(e)=>{
            parag.innerHTML=`
            <ol>
                <li> basılan tuş : ${e.key} </li>
                <li> kod : ${e.code} </li>
                </ol>`
        })

    </script>
</body>
