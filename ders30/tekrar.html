    <script>
        let sayi1 = Number(prompt("1.sayiyi giriniz"))
        let sayi2 = Number(prompt("2.sayiyi giriniz"))

        if (sayi1 > sayi2) {

        } else if (sayi1 == sayi2) {

            alert(sayi1+sayi2)
        }
