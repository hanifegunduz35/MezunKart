<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            min-height: 100vh;
            /* display: flex;
            align-items: center;
            justify-content: center; */

        }

        .anasayfa {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            margin: auto;
            width: 500px;
            height: 500px;
            display: grid;
            grid-template-areas:
                "create social social schule"
                "create social social schule"
                "create manage maintain schule"
                "write manage maintain schule"
                "write elli grow grow"
                "write elli grow grow";
            gap: 15px;

        }

        .container div {
            border: 1px solid black;
            border-radius: 10px;
        }

        .create {
            grid-area: create;
        }

        .social {
            grid-area: social;
            background-color: purple;
        }

        .schule {
            grid-area: schule;
            background-color: rgb(185, 110, 185);
        }

        .manage {
            grid-area: manage;
        }

        .maintain {
            grid-area: maintain;
            background-color: yellow;
        }

        .write {
            grid-area: write;
            background-color: yellow;
        }

        .elli {
            grid-area: elli;
        }

        .grow {
            grid-area: grow;
            background-color: purple;
        }

        @media screen and (max-width:576px) {
            .container {
                display: grid;
                grid-template-areas:
                    "create"
                    "create"
                    "create"
                    "social"
                    "schule"
                    "grow"
                    "maintain"
                    "write"
                    "elli"
                    "manage";
            }

        }
    </style>
</head>

<body>
    <div class="anasayfa">
        <div class="container">
            <div class="create"></div>
            <div class="social"></div>
            <div class="schule"></div>
            <div class="manage"></div>
            <div class="maintain"></div>
            <div class="write"></div>
            <div class="elli"></div>
            <div class="grow"></div>

        </div>
    </div>
</body>

</html>
