<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        div{
            width: 200px;
            height: 200px;
            border: 1px solid black;
        }
        section{
            height: 100vh;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-evenly ;
            /* kapsayıcının içerisindeki elamanları flex yapar ve x ekseninde pozisyonlanmasını sağlar */
            align-items: center ;
            /* align item kullanılabilmesi için yükseklik olmazsa olmazdır kesşn height değeri olmalıdır.Kapsayıcının içerisindeki bütün elementlere uygular */
            /* y ekseninde pozisyonlanmasını sağlar */
        }
        .bir{
            align-self: flex-start
            /* sadece o elemente uygular */
        }


    </style>
</head>
<body>
    <!-- justify-content display-flex display-grid -->
     <!-- kapsayıcıya verilir -->
      <section>
        <div class="bir">bir</div>
        <div class="iki">iki</div>
        <div class="ozellik ">uc</div>
        <div class="ozellik">dort</div>
      </section>
</body>
</html>
