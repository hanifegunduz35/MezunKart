<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <H2>ekleyeceğiniz ürünü giriniz</H2>
    <input type="text" id="inp">
    <button id="ekle">ekle</button>
    <button id="goster">Göster</button>
    <button id="sil">Sil</button>
    
    <script>
        let inp=document.querySelector("#inp")
        let btnEkle=document.querySelector("#ekle")
        let btnGoster=document.querySelector("#goster")
        let btnSil=document.querySelector("#sil")
        let bady=document.querySelector("body")

        //Kaydetme
        btnEkle.addEventListener("click",function(){
            localStorage.setItem("sepet",inp.value)
            alert(`sepete eklendi`)
        })

        //gösterme
        let p=document.createElement("p")
        btnGoster.addEventListener("click",()=>{
            let urun=localStorage.getItem("sepet")
            if(urun){
                p.innerHTML=urun
            }else{
                p.innerHTML="ürün yok"
            }
            bady.appendChild(p)
        })

        //silme
        btnSil.addEventListener("click",()=>{
            localStorage.removeItem("sepet")
            p.innerHTML=""
            alert(`sepet silindi   `)
        })

    </script>
</body>
</html>
