<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur.</p>

    <img src="" alt="bu bir aslan resmi">

    <a href="https://www.helloworldyazilim.com/">yazılım sayfasına gider</a>

    <script>

        let parag=document.querySelector("p")
        parag.style.color="red"
        parag.style.fontSize="40px"
        parag.style.fontWeight="bold"

        let yonlen=document.querySelector("img")
        console.log(yonlen.getAttribute("alt")) // get attribute mevcuttaki attribute in içeriğini verir
        yonlen.setAttribute("alt", "bu bir araba resmi") // attribute değiştirmek için kullanılır

        // let yonlen=document.querySelector("a")

</body>
