<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            min-height: 100vh;
        }
        div{
            border: 1px solid black;
        }
        .container{
            display: grid;
            grid-template-columns: 100px 200px 300px;
            /* sütuna göre ayutlanıp şekillenmesini sağlar */
            grid-template-rows: 100px 300px 200px;
            /* satıra göre bayutlanmasını sağlar */
            gap: 5px;
            /* yapılar arsında boşluk oluşturur */
            justify-content: center;
            /* justify-content: space-between; */
            /* justify-content hem display flexte hem de display grid de kullanılabilir */
        }

    </style>
</head>
<body>
    <div class="container">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
