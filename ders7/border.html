<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        ul{
            border: 1px solid black; /* genel kullanım*/
            /* 1px border-width temsil eder */
            /* border-style: solidi temsil eder */
            /* border-color: black temsil eder */
            border-width: 5px 3px 4px 7px;
            /* çerçevenin kalınlığı. ayrı ayrı tüm kenarları boyutlandırmak istersek üst kenardan başlayarak saat yönünde ilerler */
            border-style: double solid dashed dotted;
            /* çerçevenin stili için kullanılır.  */
            border-color: red black blue pink;
            /* tüm kenarların rengi için kullanılır */
        }
        div{
            width: 300px;
            height:300px;
            border: 1px solid black;
            /* border-width border-style border-color ayrı ayrı kullanmak yerine tek bir border özelliği altında toplanabilir */
            border-radius: 0px 30px 0 0; /* 50% */
            overflow: hidden;
            /* bir yapı resim alanı yuvarlak yapmak istersek border radiusu 50% kullanırız ama tam yuvarlak olabilmesi için width ve height eşit olmalıdır. overflow mevcut yapıdaki taşmayı engeller. */
            /*border radiusun kulllanım şekli diğer border özellikleri gibidir. çerçevenin yamuklupu temsil eder her köşeyi ayrı ayrı yamultmak istersek sol ğst kişeden saat yönünde stillenir  */

        }
        img{
            /* img ler için her zaman width 100% kullanımı önerilir */
            width: 100%;
            height: 100%;
            
        }
    </style>
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eaque blanditiis est ratione ullam temporibus vero nostrum. Nobis similique eveniet facere provident reprehenderit excepturi, adipisci est minus fugiat numquam cum odit.</p>
    <div>
        <img src="./resim2/back.jpg" alt="">
    </div>
    
    <ul>
        <li>Lorem.</li>
        <li>Dolor!</li>
        <li>Ipsam.</li>
    </ul>
</body>
</html>
