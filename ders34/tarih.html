<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- köşeli parantez dizi için kullanılır -->
    <!-- normal parantez fonk. belirtir -->
    <!-- süslü parantez dizi içindekş objelerş tanımlar ya f-da fonk. döngü koşul işlemlerini belirtmek için kullanılır -->


    <script>
        // let tarih=new Date(yıl,ay,gün)
        let tarih=new Date()
        let year=tarih.getFullYear()
        let day=tarih.getDay()
        let month=tarih.getMonth() // ay indexi 0 dan başlar
        let hours=tarih.getHours()
        let minute=tarih.getMinutes()
        let second=tarih.getSeconds()
        console.log(month)
        console.log(year)
        console.log(tarih)
        console.log(`${year}-${day}-${month+1}-${hours}-${minute}-${second}-`)

</script>
</body>
