<body>
    
    <!-- HTML - HYPERTEXT MARKUP LANGUAGE -->
    <!-- HTML bir işaretleme dilidir. Programlama dili değildir. -->
    <!-- CSS bir stillendirme dilidir. -->
    <!-- JS bir programlama dilidir. -->
    <!-- Başlık Etiketi H / 1-6 kadar 1 En Büyük Yazı Boyutu -->
    <!-- <h1>Açılış ve Kapanış Etiketleri</h1> -->
    <!-- Genellikle açılış ve kapanış etiketleri vardır. Metada yok -->
    <!-- Frontend kısmında HTML CSS JS kullanılır. -->
    <!-- Java - Javascript ayrı birer dildir. -->

     <h1>H1 En Büyük Başlik Etiketi</h1>
     <h2>H1 den küçük</h2>
     <h3>H2 den küçük</h3>
     <h4>H3 den küçük</h4>
     <h5>H4 den küçük</h5>
     <h6>H5 den küçük</h6>

     <p>Bu bir metin etiketidir. Metinsel iafedelerin p etiketi içerisinde yazilmasi</p>
     <!-- <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Illum et qui, similique quaerat praesentium autem, quasi nesciunt magni harum vitae, necessitatibus beatae? Nemo ratione sint sed sunt neque laboriosam officia.</p> -->
     <p>Lorem, ipsum dolor.</p>
     <!-- Blok Level ve Inline Etiket Farkları // Block level elementler tüm satırı kaplarken inline element sadece içeriğikadar yer kaplar.-->
     <!-- p etiketi block level  a etiketi inline element-->

     <p>deneme</p>
     <p><a href="">deneme</a></p>
     <a href="">deneme</a>
     <a href="">deneme</a>
     <a href="">deneme</a><br> 
     <!-- br inline etiket // br verildiği yerden sonra boşluk bırakarak diğer etiketin bir alt satıra geçmesini sağlar.-->
     <a href="">deneme</a><hr>
     <!-- hr block level etiket //hr etiketi verildiği yerin altına çizgi atar önceki ve sonraki elementi ayırır. -->
     <a href="">deneme</a>
     
     deneme <!-- br inline-->
     deneme2

     deneme 
     <!-- ----------------- hr block level --------------- -->
     deneme2
